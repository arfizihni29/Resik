<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Recycle Symbol - Modern & Clean -->
  <g transform="translate(50, 50)" fill="white" stroke="none">
    <!-- Arrow 1 (Top Right) -->
    <path d="M 0,-28 L 12,-20 L 10,-15 L 20,-8 L 12,-4 L 2,-10 L -2,-8 L -8,-20 Z" transform="rotate(0)"/>
    
    <!-- Arrow 2 (Bottom Right) -->
    <path d="M 0,-28 L 12,-20 L 10,-15 L 20,-8 L 12,-4 L 2,-10 L -2,-8 L -8,-20 Z" transform="rotate(120)"/>
    
    <!-- Arrow 3 (Bottom Left) -->
    <path d="M 0,-28 L 12,-20 L 10,-15 L 20,-8 L 12,-4 L 2,-10 L -2,-8 L -8,-20 Z" transform="rotate(240)"/>
    
    <!-- Center Circle -->
    <circle cx="0" cy="0" r="8" fill="white"/>
  </g>
</svg>







